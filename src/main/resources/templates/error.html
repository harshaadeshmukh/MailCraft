<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error — MailCraft</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23ea580c'/><rect x='10' y='18' width='44' height='30' rx='4' fill='none' stroke='white' stroke-width='3'/><polyline points='10,18 32,36 54,18' fill='none' stroke='white' stroke-width='3' stroke-linejoin='round'/></svg>"/>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg: #f5f5f0;
          --surface: #ffffff;
          --surface2: #f9f9f7;
          --border: #e4e4dc;
          --accent: #ea580c;
          --accent2: #c2410c;
          --text: #1a1a1a;
          --muted: #9a9a8a;
          --error: #dc2626;
          --radius: 12px;
        }

        body {
          background: var(--bg);
          color: var(--text);
          font-family: 'DM Sans', sans-serif;
          min-height: 100vh;
          overflow-x: hidden;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        body::before {
          content: '';
          position: fixed; inset: 0;
          background:
            radial-gradient(ellipse 80% 60% at 20% 0%, rgba(220,38,38,0.05) 0%, transparent 60%),
            radial-gradient(ellipse 60% 40% at 80% 100%, rgba(220,38,38,0.03) 0%, transparent 60%);
          pointer-events: none; z-index: 0;
        }

        .container {
          position: relative; z-index: 1;
          width: 100%; max-width: 500px; padding: 24px;
        }

        .card {
          background: var(--surface); border: 1px solid var(--border);
          border-radius: var(--radius); padding: 48px 32px;
          text-align: center;
          box-shadow: 0 10px 40px rgba(0,0,0,0.06);
          animation: fadeUp 0.6s ease both;
        }

        .icon-wrap {
          display: inline-flex; align-items: center; justify-content: center;
          width: 64px; height: 64px; background: rgba(220,38,38,0.1);
          color: var(--error); border-radius: 50%; margin-bottom: 24px;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; color: var(--text); margin-bottom: 12px; }
        .status-code {
          font-family: 'DM Mono', monospace; font-size: 1.1rem; letter-spacing: 0.1em;
          color: var(--error); margin-bottom: 8px; font-weight: 500;
        }
        
        .message { color: var(--muted); font-size: 1rem; line-height: 1.6; margin-bottom: 32px; }

        .btn-home {
          display: inline-flex; align-items: center; justify-content: center; gap: 8px;
          padding: 12px 24px; background: var(--text); color: #fff;
          border-radius: 8px; font-family: 'DM Sans', sans-serif;
          font-size: 0.95rem; font-weight: 500; text-decoration: none;
          transition: transform 0.2s, background 0.2s;
        }
        .btn-home:hover { transform: translateY(-2px); background: #333; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="icon-wrap">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>
        
        <div class="status-code" th:text="${status != null ? 'ERROR ' + status : 'ERROR'}">ERROR 404</div>
        <h1 th:text="${error != null ? error : 'Oops! Something went wrong.'}">Oops! Something went wrong.</h1>
        <p class="message" th:text="${message != null and !message.isEmpty() ? message : 'We encountered an unexpected issue. Please try again later.'}"></p>
        
        <a href="/" class="btn-home">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Return to Home
        </a>
    </div>
</div>

</body>
</html>
